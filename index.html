<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diseña tu ramo</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <p>Arrastra las flores para crear un ramo único.</p>
    </header>

    <main>

        <aside id="panel">
            <h2>Flores</h2>

            <div id="flores">
                <img src="flores/rosa.png" class="flor">
                <img src="flores/tulipan.png" class="flor">
                <img src="flores/margarita.png" class="flor">
            </div>
        </aside>

        <section id="lienzo">

            <h2>Tu ramo</h2>

            <div id="canvas">

            </div>

        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
